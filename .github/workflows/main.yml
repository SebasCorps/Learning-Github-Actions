name: my-first-workflow
on:
  push:
    branches:
      - dev
      - 'feature-*'
      - main
  pull_request:
    branches:
      - main
env:
  ENV_TYPE: DEV
  APP_USER: thinknyx
  APP_PORT: 80
jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Step-3
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
      - name: Upload Single File
        uses: actions/upload-artifact@v7
        with:
          name: single_file
          path: ./myartifact.txt
      - name: Upload from directory
        uses: actions/upload-artifact@v7
        with:
          name: directory_artifacts
          path: artifacts/
      - name: Upload from multiple paths
        uses: actions/upload-artifact@v7
        with:
          name: multiple_paths
          path: |
            ./myartifact.txt
            artifacts/
      - name: Upload from multiple paths with exclusions
        uses: actions/upload-artifact@v7
        with:
          name: multiple_paths_with_exclusions
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: checking current directory
        run: |
          pwd
          ls -ltr
      - name: Download single file artifact
        uses: actions/download-artifact@v8
        with:
          name: single_file
      - name: Refering Environment Variables
        run: |
          echo "[INFO] Running Deployment for $ENV_TYPE with user $APP_USER."
          echo "[INFO] once deployment application is accessible on port $APP_PORT."
      - name: Referencing Repository Secret
        run: | 
          echo "[INFO] application password is ${{ secrets.APP_PASSWORD}}"
  job3:
     name: JOB3
     runs-on: ubuntu-latest
     steps:
       - name: Referring context or inb-built variables
         run: |
           echo "[INFO] treiggered by ${{ github.event_name }}."
           echo "[INFO] new changes are added by ${{ github.actor }} in ${{ github.ref_name}} branch."
           echo "[INFO] Current Step is running on ${{ runner.os }}."
           echo "[INFO] Current JOB Id is ${{ job.check_run_id }}."


   
