name: my-first-workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Running Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Test
        run: |
          mkdir reports/
          pytest -v \
            --junitxml=reports/unit-test-results.xml \
            --cov=. \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: ['python']      # ← sin espacios extra
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

  SonarQube:                      # ← dentro de jobs: (mismo nivel que los otros)
    name: SonarQube
    runs-on: ubuntu-latest  
    needs: unit-tests  # ← minúsculas
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Coverage Report
        uses: actions/download-artifact@v5.0.0
        with:
           
          name: unit-test-report
          path: reports/

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [codeql, SonarQube]
    if: success()
    outputs:
      image-tags: ${{steps.vars.outputs.IMAGE_TAGS }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4          # ← v5 no existe, usar v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Generate Image tags
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAGS="${{ github.run_id }}-${SHORT_SHA}"
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT

      - name: Build image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: thinkynx_app:${{ steps.vars.outputs.IMAGE_TAGS }}
      
      - name: Save Docker Image as artifact
        run : docker save thinkynx_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o thinkynx_app.tar
      
      - name: Upload Docker image Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: thinkynx_app_image
          path: thinkynx_app.tar
