name: ci-pipeline
#
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  actions: read
  security-events: write
  packages: write
  contents: read
jobs:
  ci-pipeline-job:
    uses: SebasCorps/reusable-workflows/.github/workflows/ci-pipeline.yml@main
    with:
      run_codeql: true #test222333434344343434
      run_sonarqube: true
      run_build: true
      run_ghcr_publish: true
      
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_PASSWORD }} 

  deploy-with-kubectl:
    needs: ci-pipeline-job
    uses: SebasCorps/reusable-workflows/.github/workflows/deploy-with-kubectl.yml@main
    with:
      ENVIRONMENT: STAGING
      IMAGE_NAME: ghcr.io/sebasxdd/thinkynx_app
    secrets:
      KUBECONFIG: ${{secrets.KUBECONFIG}}
  #
  run-selenium-test:
    environment: STAGING
    needs: deploy-with-kubectl
    runs-on: github-actions-scaleset-demo
    steps:
      - name: CheckoutCode
        uses: actions/checkout@v5
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Chromium
        run: |
            sudo apt-get update
            sudo apt-get install -y software-properties-common
            sudo add-apt-repository -y ppa:xtradeb/apps
            sudo apt-get update
            sudo apt-get install -y chromium
            which chromium
      - name: Install dependencies
        run: |
          pip install -r requirements-tests.txt
      - name: Run Selenium tests
        env:
          APP_BASE_URL: ${{VARS.APP_BASE_URL}}
        run: |
          mkdir -p reports
          pytest tests/ --html=reports/selenium-report.html --self-contained-html
      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v4.0.0
        with:
           name: selenium-test-report
           path: reports/
           #