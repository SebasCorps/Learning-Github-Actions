name: ci-pipeline
#
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  actions: read
  security-events: write
  packages: write
  contents: read
jobs:
  ci-pipeline-job:
    uses: SebasCorps/reusable-workflows/.github/workflows/ci-pipeline.yml@main
    with:
      run_codeql: true #test22233343434434343444
      run_sonarqube: true
      run_build: true
      run_ghcr_publish: true
      
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_PASSWORD }} 

  deploy-with-kubectl:
    needs: ci-pipeline-job
    uses: SebasCorps/reusable-workflows/.github/workflows/deploy-with-kubectl.yml@main
    with:
      ENVIRONMENT: STAGING
      IMAGE_NAME: ghcr.io/sebasxdd/thinkynx_app
    secrets:
      KUBECONFIG: ${{secrets.KUBECONFIG}}
  #
  selenium-tests:
     needs: deploy-with-kubectl
     uses: SebasCorps/reusable-workflows/.github/workflows/run-selenium-tests.yml@main
     with:
       ENVIRONMENT: STAGING