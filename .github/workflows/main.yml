name: ci-pipeline
#
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  actions: read
  security-events: write
  packages: write
  contents: read
jobs:
  ci-pipeline-job:
    uses: SebasCorps/reusable-workflows/.github/workflows/ci-pipeline.yml@main
    with:
      run_codeql: true #test222333434344343434
      run_sonarqube: true
      run_build: true
      run_ghcr_publish: true
      
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_PASSWORD }} 

  deploy-with-kubectl:
    environment: STAGING
    env:
      NAMESPACE: ${{vars.NAMESPACE}}

    needs: ci-pipeline-job
    runs-on: github-actions-scaleset-demo
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: Install Kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          kubectl version
          kubectl get nodes
      - name: Install yq
        run: |
          sudo curl -L https://github.com/mikefarah/yq/releases/download/v4.35.1/yq_linux_amd64 -o /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          yq --version
      
      - name: update image name in deployment yaml
        run: |
          IMAGE_TAGS="${{ github.run_id }}-${GITHUB_SHA::7}"
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          export IMAGE="ghcr.io/${REPO_OWNER}/thinkynx_app:${IMAGE_TAGS}"
          yq e ' .spec.template.spec.containers[0].image = strenv(IMAGE)' manifest/deployment.yaml -i
          cat manifest/deployment.yaml
          
      - name: Create Namespace if not exists
        run: | 
          kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE
      - name: Deploy to kubernetes Cluster 
        run: | 
          kubectl apply -f manifest/ -n $NAMESPACE
      - name: verify deployment
        run: | 
          kubectl rollout status deployment/thinkynxapp-deploy -n $NAMESPACE
          kubectl get all -n $NAMESPACE